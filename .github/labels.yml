- name: enhancement
  color: "a2eeef"
  description: New feature or request

- name: triage
  color: "fbca04"
  description: Needs maintainer review

- name: good first issue
  color: "7057ff"
  description: Good for newcomers

- name: help wanted
  color: "008672"
  description: Extra attention is needed

- name: docs
  color: "0075ca"
  description: Documentation improvements

- name: deck
  color: "f9d0c4"
