name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu }
          - { os: macos-latest,   target: x86_64-apple-darwin }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p kotoba-cli
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf dist/kotoba-${{ matrix.target }}.tar.gz kotoba
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir dist
          Compress-Archive -Path target/${{ matrix.target }}/release/kotoba.exe -DestinationPath dist/kotoba-${{ matrix.target }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: kotoba-${{ matrix.target }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
