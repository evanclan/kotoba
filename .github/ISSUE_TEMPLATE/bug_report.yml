name: 🐛 Bug report
description: Report a problem with Kotoba's CLI, daemon, or core library.
title: "bug: <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
        Please fill in as much as you can — incomplete reports take longer to triage.

  - type: input
    id: version
    attributes:
      label: Kotoba version
      description: Output of `kotoba --version`.
      placeholder: "0.0.1"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Windows (native)
        - Other (please specify in description)
    validations:
      required: true

  - type: input
    id: shell
    attributes:
      label: Shell (if relevant)
      placeholder: "zsh 5.9, fish 3.7, bash 5.2, nushell 0.95, ..."

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Numbered steps that reliably reproduce the bug.
      placeholder: |
        1. Run `kotoba init`
        2. Run `kotoba add 留学`
        3. Observe the panic
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste any relevant logs. Run with `RUST_LOG=debug` if possible.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](../../CODE_OF_CONDUCT.md).
          required: true
